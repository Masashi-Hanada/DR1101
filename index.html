<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>eighty-seven DR-1101</title>
<style>
:root{ --or:#ff6600; --lcd:#b8c8a0; --ldark:#2a3a1a; }
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; touch-action:none; }
html{ height:100%; overflow:hidden; }
body{ height:100%; overflow:hidden; background:#333; display:flex; justify-content:center; }
#app{ width:100%; max-width:480px; height:100%; display:flex; flex-direction:column; overflow:hidden; background:linear-gradient(180deg,#d4d4d4,#b8b8b8); }

/* タブ → 一番上、SONGも同色 */
.tab-bar{ display:flex; background:#222; flex-shrink:0; }
.tab-btn{ flex:1; background:#2a2a2a; color:#888; border:none; padding:5px 2px; font-size:11px; font-weight:bold; cursor:pointer; border-right:1px solid #111; }
.tab-btn:last-child{ border-right:none; }
.tab-btn.active{ background:#555; color:#fff; }

/* ヘッダー → 黒地・白文字・2倍の厚さ */
.header{ background:#111; color:#fff; font-size:13px; font-weight:bold; letter-spacing:.5px; padding:10px 10px; flex-shrink:0; }
.chassis{ flex:1; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
.screen-page{ display:none; flex-direction:column; flex:1; overflow:hidden; min-height:0; }
.screen-page.active{ display:flex; }

/* LCD — 左右に黒枠(10px)、上辺6px、下辺12px */
.lcd-section{ background:#111; flex-shrink:0; }
.lcd-frame{ background:#111; padding:6px 10px 12px; }
.lcd-inner{ overflow:hidden; }
canvas#seqCanvas{ display:block; width:100%; }

/* 修正5: ベロシティ凡例エリアを削除 → .vel-legend は非表示 */
.vel-legend{ display:none; }

.phbar{ display:flex; gap:2px; padding:2px; background:#111; justify-content:center; }
.ph-dot{ width:6px; height:6px; border-radius:50%; background:#333; }
.ph-dot.on{ background:var(--or); box-shadow:0 0 4px var(--or); }

/* KNOB SECTION */
.knob-section{ background:linear-gradient(180deg,#c8c8c8,#b8b8b8); padding:6px 4px 4px; display:flex; align-items:center; gap:2px; border-top:1px solid #aaa; border-bottom:1px solid #888; flex-shrink:0; }

/* 修正2: VELボタンをノブと同じ高さに揃える */
.vel-btn-wrap{ display:flex; flex-direction:column; align-items:center; gap:2px; flex-shrink:0; width:36px; justify-content:center; margin-left:50px; }
.vel-btn{ width:32px; height:32px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#f0f0f0,#c0c0c0 60%,#909090); border:2px solid #888; cursor:pointer; font-size:8px; font-weight:bold; color:#333; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 4px rgba(0,0,0,.4),inset 0 1px 1px rgba(255,255,255,.5); }
.vel-btn.active{ background:radial-gradient(circle at 35% 30%,#ffaa44,#ff6600 60%,#cc4400); color:#fff; }
.vel-lbl{ font-size:7px; color:#555; text-align:center; }
.knobs-row{ display:flex; flex:1; justify-content:space-evenly; align-items:center; padding:0 4px; }
.knob-wrap{ display:flex; flex-direction:column; align-items:center; gap:1px; position:relative; padding:0 6px; }
.knob-name{ font-size:9px; color:#444; font-weight:bold; letter-spacing:.3px; }
.knob-body{ position:relative; width:52px; height:52px; cursor:pointer; flex-shrink:0; }
.knob-ticks{ position:absolute; top:0; left:0; width:52px; height:52px; }
.knob-dial{ width:42px; height:42px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#444,#1a1a1a 70%,#000); border:2px solid #555; position:absolute; top:5px; left:5px; box-shadow:0 3px 8px rgba(0,0,0,.6),inset 0 1px 2px rgba(255,255,255,.15); }
.knob-ind{ position:absolute; top:50%; left:50%; width:2px; height:13px; background:var(--or); border-radius:1px; transform-origin:bottom center; transform:translateX(-50%) translateY(-100%); box-shadow:0 0 3px var(--or); }
.knob-val{ font-size:11px; font-weight:bold; color:#222; text-align:center; min-width:42px; }
.knob-arrows{ display:none; flex-direction:column; align-items:center; position:absolute; right:-22px; top:8px; z-index:10; }
.knob-arrows.on{ display:flex; }
.k-arr{ font-size:16px; color:var(--or); cursor:pointer; line-height:1.2; padding:1px 3px; }

/* SLITS */
.slits{ background:#b8b8b8; padding:3px 14px; display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
.slit{ height:2px; background:#888; border-radius:1px; box-shadow:inset 0 1px 1px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.4); }

/* PADS */
.pad-section{ background:linear-gradient(180deg,#bbb,#aaa); padding:4px 7px 3px; flex-shrink:0; }
.pad-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
.pad{ background:linear-gradient(180deg,#6bcfff,#3aa8e8 50%,#2288c8); border:1px solid #1a70a8; border-radius:4px; color:#fff; font-size:10px; font-weight:bold; cursor:pointer; aspect-ratio:3/2; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 0 #1a70a8,inset 0 1px 0 rgba(255,255,255,.4); transition:.08s; text-shadow:0 1px 2px rgba(0,0,0,.4); }
.pad.active{ transform:translateY(2px); box-shadow:0 1px 0 #1a70a8; background:linear-gradient(180deg,#2288c8,#1a70a8); }

/* FOOTER — 4段構成 */
.footer{ background:linear-gradient(180deg,#b0b0b0,#a0a0a0); padding:3px 5px 4px; border-top:2px solid #888; flex-shrink:0; }
.footer-r1{ display:grid; grid-template-columns:repeat(5,1fr); gap:2px; margin-bottom:2px; }
.footer-r2{ display:flex; gap:2px; margin-bottom:2px; }
.footer-r3,.footer-r4{ display:grid; grid-template-columns:repeat(8,1fr); gap:2px; margin-bottom:2px; }
.fb{ border:1px solid #888; border-radius:3px; font-size:9px; font-weight:bold; cursor:pointer; padding:3px 1px; text-align:center; display:flex; align-items:center; justify-content:center; min-height:24px; box-shadow:0 2px 0 #666,inset 0 1px 0 rgba(255,255,255,.4); line-height:1.1; transition:.08s; }
.fb:active{ transform:translateY(1px); box-shadow:0 1px 0 #666; }
.fb-blue{ background:linear-gradient(180deg,#6bcfff,#3aa8e8); color:#fff; border-color:#1a70a8; }
.fb-ora{ background:linear-gradient(180deg,#ffcc88,#ffaa44); color:#fff; border-color:#cc7700; }
.fb-ora.active{ background:linear-gradient(180deg,#ff8800,#ff6600); box-shadow:0 0 6px rgba(255,102,0,.7); }
.fb-gray{ background:linear-gradient(180deg,#d8d8d8,#c0c0c0); color:#555; border-color:#999; }
.fb-wht{ background:linear-gradient(180deg,#f0f0f0,#e0e0e0); color:#222; border-color:#aaa; font-size:10px; }
.fb-wht.active{ background:linear-gradient(180deg,#ccc,#aaa); box-shadow:0 1px 0 #666; }
@keyframes wblink{ 0%,100%{ background:linear-gradient(180deg,#6bcfff,#3aa8e8); } 50%{ background:linear-gradient(180deg,#f44,#c00); color:#fff; } }
.writing{ animation:wblink .4s infinite; }

/* MIX */
.fx-bar{ background:#b8b8b8; padding:4px 7px; display:flex; gap:4px; flex-shrink:0; }
.fx-btn{ flex:1; background:linear-gradient(180deg,#d8d8d8,#b8b8b8); border:1px solid #888; border-radius:4px; color:#222; font-size:9px; font-weight:bold; padding:5px 3px; cursor:pointer; box-shadow:0 2px 0 #666,inset 0 1px 0 rgba(255,255,255,.5); text-align:center; }
.fx-btn.active{ background:linear-gradient(180deg,#aaa,#999); transform:translateY(1px); box-shadow:0 1px 0 #666; }
.mix-area{ flex:1; overflow-y:auto; overflow-x:hidden; padding:4px; background:#c0c0c0; }
.mix-table{ width:100%; border-collapse:collapse; font-size:11px; }
.mix-table th{ background:#777; color:#fff; padding:3px 2px; font-size:10px; text-align:center; border:1px solid #555; }
.mix-table td{ background:#cecece; border:1px solid #aaa; padding:2px 1px 3px; text-align:center; vertical-align:middle; }
.mpart{ font-weight:bold; font-size:11px; cursor:pointer; padding:2px 3px; border-radius:2px; background:#c4c4c4; border:1px solid #999; white-space:nowrap; }
.mpart.muted{ opacity:.4; text-decoration:line-through; }
.mpart.soloed{ background:#ffcc44; border-color:#cc9900; }
.mk-wrap{ display:flex; flex-direction:column; align-items:center; gap:1px; }
.mk{ width:26px; height:26px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#444,#111 70%,#000); border:1.5px solid #555; position:relative; cursor:pointer; box-shadow:0 2px 4px rgba(0,0,0,.5); }
.mk-ind{ position:absolute; top:50%; left:50%; width:1.5px; height:8px; background:var(--or); transform-origin:bottom center; transform:translateX(-50%) translateY(-100%); }
.mk-val{ font-size:9px; color:#333; font-weight:bold; }
.fx2-area{ background:#b0b0b0; padding:5px 8px; display:none; flex-shrink:0; }
.fx2-area.on{ display:block; }
.fx2-row{ display:flex; gap:6px; align-items:center; margin-bottom:6px; }
.fx2-sel{ background:#e0e0e0; border:1px solid #999; border-radius:3px; font-size:10px; padding:3px 5px; flex:1; touch-action:auto; }
.fx2-knobs{ display:flex; gap:14px; justify-content:center; }
.fx2-kw{ display:flex; flex-direction:column; align-items:center; gap:2px; }
.fx2-klbl{ font-size:9px; color:#444; font-weight:bold; }

/* SOUND SET */
.ss-row{ display:flex; gap:3px; margin-bottom:4px; }
.ss-btn{ flex:1; border-radius:3px; font-size:8px; font-weight:bold; padding:5px 2px; cursor:pointer; text-align:center; line-height:1.3; box-shadow:0 2px 0 rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.3); border:1px solid; min-height:32px; display:flex; align-items:center; justify-content:center; }
.ss-btn:active{ transform:translateY(1px); box-shadow:0 1px 0 rgba(0,0,0,.2); }
.ss-load{ background:linear-gradient(180deg,#d8d8d8,#c0c0c0); color:#1a70a8; border-color:#aaa; }
.ss-load-e{ background:linear-gradient(180deg,#ffcc88,#ff8800); color:#fff; border-color:#cc5500; box-shadow:0 2px 0 #993300,inset 0 1px 0 rgba(255,255,255,.3); }
.ss-load-all{ background:linear-gradient(180deg,#6bcfff,#3aa8e8); color:#fff; border-color:#1a70a8; box-shadow:0 2px 0 #0a5088,inset 0 1px 0 rgba(255,255,255,.3); }
.ss-save{ background:linear-gradient(180deg,#d8d8d8,#c0c0c0); color:#c00; border-color:#aaa; }

/* GLOBAL toggle */
.tog-row{ display:flex; align-items:center; gap:6px; margin-bottom:5px; flex-wrap:wrap; }
.tog-lbl{ font-size:9px; font-weight:bold; color:#444; min-width:80px; }
.tog-btn{ font-size:8px; font-weight:bold; padding:3px 8px; border-radius:3px; cursor:pointer; border:1px solid #999; background:linear-gradient(180deg,#d8d8d8,#c0c0c0); color:#666; box-shadow:0 2px 0 #888; }
.tog-btn.on{ background:linear-gradient(180deg,#ffcc88,#ff8800); color:#fff; border-color:#cc5500; box-shadow:0 2px 0 #993300; }
.tog-desc{ font-size:8px; color:#666; line-height:1.4; }
.set-area{ flex:1; overflow-y:auto; overflow-x:hidden; padding:5px 8px; background:#c0c0c0; }
.set-title{ font-size:10px; font-weight:bold; color:#555; letter-spacing:1px; margin:8px 0 3px; border-bottom:1px solid #aaa; padding-bottom:2px; }
.samp-row{ display:flex; align-items:center; gap:4px; margin-bottom:4px; background:#ccc; border-radius:3px; padding:3px 5px; }
.samp-lbl{ font-size:9px; font-weight:bold; color:#333; min-width:26px; }
.samp-disp{ flex:1; background:var(--lcd); border:1px solid #888; border-radius:2px; font-size:9px; color:var(--ldark); padding:2px 4px; font-family:monospace; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.samp-btns{ display:flex; gap:3px; }
.samp-btn{ background:linear-gradient(180deg,#6bcfff,#3aa8e8); border:1px solid #1a70a8; border-radius:3px; color:#fff; font-size:8px; font-weight:bold; padding:3px 5px; cursor:pointer; box-shadow:0 2px 0 #1a70a8; white-space:nowrap; }
.samp-btn.del{ background:linear-gradient(180deg,#f88,#e44); border-color:#a00; box-shadow:0 2px 0 #a00; }
.samp-btn:active{ transform:translateY(1px); }
.samp-active{ background:#c0e8b0!important; border-color:#4a8!important; }
.glob-row{ display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
.midi-btn{ background:linear-gradient(180deg,#e0e0e0,#c8c8c8); border:1px solid #999; border-radius:4px; font-size:9px; font-weight:bold; color:#333; padding:4px 8px; cursor:pointer; display:flex; align-items:center; gap:4px; box-shadow:0 2px 0 #888; }
.midi-dot{ width:8px; height:8px; border-radius:50%; background:#888; }
.io-btn{ background:linear-gradient(180deg,#6bcfff,#3aa8e8); border:1px solid #1a70a8; border-radius:4px; color:#fff; font-size:9px; font-weight:bold; padding:5px 8px; cursor:pointer; box-shadow:0 2px 0 #1a70a8; }
.io-btn:active{ transform:translateY(1px); }
.preset-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-top:4px; }
.preset-btn{ background:linear-gradient(180deg,#e8e8e8,#d0d0d0); border:1px solid #999; border-radius:4px; font-size:8px; font-weight:bold; color:#333; padding:4px 2px; cursor:pointer; text-align:center; line-height:1.3; box-shadow:0 2px 0 #888; }
.preset-btn.on{ background:linear-gradient(180deg,#88cc44,#559900); color:#fff; }

/* POPUP */
.pop-ov{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:200; justify-content:center; align-items:center; }
.pop-ov.on{ display:flex; }
.pop-box{ background:linear-gradient(180deg,#d8d8d8,#c0c0c0); border:2px solid #888; border-radius:8px; padding:12px; width:92%; max-width:370px; box-shadow:0 8px 24px rgba(0,0,0,.6); }
.pop-title{ font-size:12px; font-weight:bold; color:#222; margin-bottom:10px; border-bottom:1px solid #aaa; padding-bottom:4px; display:flex; justify-content:space-between; align-items:center; }
.pop-close{ background:#888; color:#fff; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:12px; }
.pop-row{ display:flex; gap:6px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
.pop-lbl{ font-size:10px; color:#444; font-weight:bold; min-width:44px; }
.type-btn{ background:linear-gradient(180deg,#d8d8d8,#c0c0c0); border:1px solid #888; border-radius:3px; font-size:9px; padding:3px 8px; cursor:pointer; color:#222; }
.type-btn.active{ background:linear-gradient(180deg,#3aa8e8,#1a70a8); color:#fff; border-color:#0a5088; }
.on-off{ background:linear-gradient(180deg,#ddd,#c0c0c0); border:1px solid #999; border-radius:3px; font-size:9px; padding:3px 8px; cursor:pointer; color:#555; font-weight:bold; }
.on-off.active{ background:linear-gradient(180deg,#88cc44,#559900); color:#fff; border-color:#337700; }
.pk-row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:6px; }
.pk-wrap{ display:flex; flex-direction:column; align-items:center; gap:2px; }
.pk-lbl{ font-size:9px; color:#555; text-align:center; }
.pk{ width:36px; height:36px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#444,#111 70%,#000); border:1.5px solid #555; position:relative; cursor:pointer; box-shadow:0 2px 4px rgba(0,0,0,.5); }
.pk-ind{ position:absolute; top:50%; left:50%; width:1.5px; height:11px; background:var(--or); transform-origin:bottom center; transform:translateX(-50%) translateY(-100%); }
.pk-val{ font-size:9px; color:#333; font-weight:bold; }

/* SONG MODE */
.song-toolbar{ display:flex; gap:3px; padding:5px 6px; background:#b0b0b0; border-bottom:1px solid #888; flex-shrink:0; align-items:center; }
.song-tb-btn{ flex:1; font-size:9px; padding:4px 2px; min-width:0; }
#songPlayBtn.active{ background:linear-gradient(180deg,#ff6600,#cc3300)!important; border-color:#990000!important; animation:songBlink .6s infinite; }
@keyframes songBlink{ 0%,100%{opacity:1}50%{opacity:.6} }
.song-no-disp{ font-size:9px; font-weight:bold; color:#333; white-space:nowrap; padding:2px 4px; background:#ddd; border:1px solid #aaa; border-radius:3px; text-align:center; min-width:36px; flex-shrink:0; }
.song-list-wrap{ flex:1; overflow-y:auto; overflow-x:hidden; background:#c8c8c8; }
.song-table{ width:100%; border-collapse:collapse; font-size:10px; table-layout:fixed; }
.song-table th{ background:#666; color:#fff; padding:4px 2px; font-size:9px; text-align:center; border:1px solid #444; position:sticky; top:0; z-index:2; }
.song-table td{ background:#d0d0d0; border:1px solid #bbb; padding:6px 1px; text-align:center; vertical-align:middle; min-height:44px; }
.song-table tr.playing-row td{ background:#ffe8cc!important; color:#cc5500!important; }
.song-table tr:nth-child(even) td{ background:#c8c8c8; }
.song-table tr.dragging td{ background:#ffe0a0!important; opacity:.7; }
.song-table tr.drag-over td{ border-top:2px solid var(--or)!important; }
.song-comment{ background:#f0f0e8; border:1px solid #bbb; border-radius:2px; font-size:9px; padding:2px 3px; width:100%; touch-action:auto; text-align:left; }
.song-isel{ background:#e8e8e8; border:1px solid #aaa; border-radius:2px; font-size:9px; padding:1px 0; width:100%; touch-action:auto; }
.song-row-num{ font-weight:bold; color:#666; font-size:9px; cursor:pointer; }
.song-table tr.loop-mark .song-row-num{ background:#e44; color:#fff; border-radius:2px; padding:1px 3px; }
.bpm-arr{ display:inline-flex; flex-direction:column; vertical-align:middle; margin-left:1px; gap:1px; }
.bpm-arr button{ font-size:7px; line-height:1; padding:0 2px; background:#ddd; border:1px solid #aaa; border-radius:2px; cursor:pointer; color:#333; }
.song-bank-sel,.song-pat-sel,.song-bpm-sel{ background:#e0e0e0; border:1px solid #999; border-radius:2px; font-size:9px; padding:2px 2px; width:100%; touch-action:auto; }
.song-bpm-val{ font-size:10px; font-weight:bold; color:#333; }
.song-bpm-input-cell input{ width:48px; background:#e8e8e8; border:1px solid #aaa; border-radius:2px; font-size:9px; padding:1px 3px; touch-action:auto; }
.song-del-btn{ background:linear-gradient(180deg,#f88,#e44); border:1px solid #a00; border-radius:3px; color:#fff; font-size:10px; font-weight:bold; padding:2px 5px; cursor:pointer; box-shadow:0 1px 0 #800; }
.song-del-btn:active{ transform:translateY(1px); }
.song-up-btn{ background:linear-gradient(180deg,#ddd,#bbb); border:1px solid #999; border-radius:3px; color:#444; font-size:10px; padding:2px 4px; cursor:pointer; }
.song-add-panel{ background:#b8b8b8; border-top:2px solid #888; padding:8px; flex-shrink:0; }
.song-add-row{ display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
.song-add-lbl{ font-size:9px; font-weight:bold; color:#444; min-width:36px; }
.song-sel{ background:#e0e0e0; border:1px solid #999; border-radius:3px; font-size:10px; padding:3px 5px; flex:1; touch-action:auto; }
.song-bpm-input{ background:#e8e8e8; border:1px solid #aaa; border-radius:3px; font-size:10px; padding:3px 5px; width:70px; touch-action:auto; }
</style>
</head>
<body>
<div id="app">
  <!-- 修正1: ヘッダー黒地・白文字 -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="seq">SEQUENCER</button>
    <button class="tab-btn" data-tab="mix">MIX</button>
    <button class="tab-btn" data-tab="setting">SETTING</button>
    <button class="tab-btn" data-tab="song">SONG</button>
  </div>
  <div class="header">eighty-seven DR-1101</div>
  <div class="chassis">
    <!-- SEQ -->
    <div class="screen-page active" id="page-seq">
      <div class="lcd-section">
        <div class="lcd-frame"><div class="lcd-inner"><canvas id="seqCanvas"></canvas></div></div>
        <!-- 修正5: vel-legendはdisplay:noneにしてあるので実質削除 -->
        <div class="vel-legend">
          <div class="vel-item"><div class="vel-dot" style="background:#eee;border:2px solid #999"></div>弱</div>
          <div class="vel-item"><div class="vel-dot" style="background:#666;border:2px solid #333"></div>普通</div>
          <div class="vel-item"><div class="vel-dot" style="background:#000;border:2px solid #000"></div>強</div>
        </div>
        <div class="phbar" id="phbar"></div>
      </div>
      <!-- 修正2: knob-sectionのalign-itemsをcenterにしてVELボタンとノブを同じ高さに -->
      <div class="knob-section" style="align-items:center;">
        <div class="vel-btn-wrap">
          <div class="vel-btn" id="velBtn">VEL</div>
          <div class="vel-lbl">VELOCITY</div>
        </div>
        <div class="knobs-row" id="knobsRow"></div>
      </div>
      <div class="slits"><div class="slit"></div><div class="slit"></div><div class="slit"></div><div class="slit"></div></div>
      <div class="pad-section"><div class="pad-grid" id="padGrid"></div></div>
    </div>

    <!-- MIX -->
    <div class="screen-page" id="page-mix">
      <div class="mix-area"><table class="mix-table"><thead><tr><th>PART</th><th>VOL</th><th>TUNE</th><th>DECAY</th><th>REV</th></tr></thead><tbody id="mixBody"></tbody></table></div>
      <div class="pad-section" id="mixPads"><div class="pad-grid" id="padGridMix"></div></div>
      <div class="fx-bar">
        <button class="fx-btn" id="rvBtn">REVERB</button>

<script>
// ================================================================
// STATE
// ================================================================
const PARTS=['CY','OH','CH','T1','T2','CP','SD','BD'];
const PAD_TOP=['CP','CH','OH','CY'];
const PAD_BOT=['BD','SD','T1','T2'];
const BANKS=['A','B','C','D'];
const MAX_STEPS=16;
function mkPat(){return PARTS.map(()=>Array(MAX_STEPS).fill(0));}
function clone(o){return JSON.parse(JSON.stringify(o));}

const PRESETS=[
  {name:'4onFloor', bpm:128,swing:0},{name:'AcidKick', bpm:138,swing:0},
  {name:'HouseGrv', bpm:124,swing:20},{name:'TechnoFx', bpm:140,swing:0},
  {name:'AcidLine', bpm:135,swing:0},{name:'DrumBrk',  bpm:132,swing:15},
  {name:'LatinHse', bpm:126,swing:25},{name:'MinTech',  bpm:142,swing:0},
  {name:'ChicagoH', bpm:125,swing:30},{name:'TrancyK',  bpm:138,swing:0},
  {name:'JungleB',  bpm:170,swing:0},{name:'FunkDrm',  bpm:105,swing:40},
  {name:'SlowHse',  bpm:118,swing:20},{name:'TomRoll',  bpm:130,swing:10},
  {name:'RaveClp',  bpm:145,swing:0},{name:'OpenHH',   bpm:128,swing:35},
];
function makePresetPat(i){
  const p=mkPat();
  const fills=[
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[4,12].forEach(s=>p[6][s]=2);[0,2,4,6,8,10,12,14].forEach(s=>p[2][s]=2);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[2,10].forEach(s=>p[7][s]=1);[2,6,10,14].forEach(s=>p[1][s]=2);[0,2,4,6,8,10,12,14].forEach(s=>p[2][s]=2);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[4,12].forEach(s=>p[6][s]=2);[2,6,10,14].forEach(s=>p[5][s]=1);[0,2,4,6,8,10,12,14].forEach(s=>p[2][s]=2);[2,6,14].forEach(s=>p[1][s]=2);},
    ()=>{[0,2,4,6,8,10,12,14].forEach(s=>p[7][s]=s%8===0?3:2);[1,5,9,13].forEach(s=>p[6][s]=2);[0,2,4,6,8,10,12,14].forEach(s=>p[2][s]=2);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[2,6,10,14].forEach(s=>p[7][s]=1);[4,12].forEach(s=>p[6][s]=3);[0,4,8,12].forEach(s=>p[2][s]=2);[2,6,10,14].forEach(s=>p[2][s]=1);},
    ()=>{[0,9].forEach(s=>p[7][s]=3);[3,12].forEach(s=>p[7][s]=2);[5,14].forEach(s=>p[7][s]=1);[4,12].forEach(s=>p[6][s]=3);[1,7,10].forEach(s=>p[6][s]=1);[0,4,8,12].forEach(s=>p[2][s]=2);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[2,6,10,14].forEach(s=>p[6][s]=2);[5,13].forEach(s=>p[5][s]=3);[0,3,6,9,12,15].forEach(s=>p[2][s]=2);[1,7].forEach(s=>p[1][s]=2);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[6,14].forEach(s=>p[7][s]=1);[4,12].forEach(s=>p[6][s]=2);[0,4,8,12].forEach(s=>p[2][s]=3);[2,6,10,14].forEach(s=>p[2][s]=1);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[4,12].forEach(s=>p[6][s]=3);[2,10].forEach(s=>p[6][s]=1);[8].forEach(s=>p[5][s]=2);[0,2,4,6,8,10,12,14].forEach(s=>p[2][s]=2);[3,7,11,15].forEach(s=>p[1][s]=2);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[2,6,10,14].forEach(s=>p[7][s]=1);[2,10].forEach(s=>p[6][s]=2);[0,2,4,6,8,10,12,14].forEach(s=>p[2][s]=2);[1,5,9,13].forEach(s=>p[2][s]=1);},
    ()=>{[0,9].forEach(s=>p[7][s]=3);[3,12].forEach(s=>p[7][s]=2);[5,14].forEach(s=>p[7][s]=1);[4,12].forEach(s=>p[6][s]=3);[1,7,10].forEach(s=>p[6][s]=1);[0,4,8,12].forEach(s=>p[2][s]=2);},
    ()=>{[0,8].forEach(s=>p[7][s]=3);[4].forEach(s=>p[7][s]=2);[10,14].forEach(s=>p[7][s]=1);[4,12].forEach(s=>p[6][s]=3);[6].forEach(s=>p[6][s]=1);[2,6,10,14].forEach(s=>p[5][s]=2);[0,4,6,8,10,14].forEach(s=>p[2][s]=2);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[4,12].forEach(s=>p[6][s]=2);[8].forEach(s=>p[5][s]=3);[0,3,6,9,12,15].forEach(s=>p[2][s]=2);[5,13].forEach(s=>p[1][s]=2);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[4,12].forEach(s=>p[6][s]=2);[2,6,9,13].forEach(s=>p[3][s]=2);[3,7,10,14].forEach(s=>p[4][s]=2);[0,4,8,12].forEach(s=>p[2][s]=3);[2,6,10,14].forEach(s=>p[2][s]=1);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[4,8,12].forEach(s=>p[6][s]=2);[0,4,8,12].forEach(s=>p[5][s]=2);[2,6,10,14].forEach(s=>p[5][s]=1);[0,2,4,6,8,10,12,14].forEach(s=>p[2][s]=2);},
    ()=>{[0,4,8,12].forEach(s=>p[7][s]=3);[4,12].forEach(s=>p[6][s]=2);[2,10].forEach(s=>p[1][s]=3);[6,14].forEach(s=>p[1][s]=2);[0,4,8,12].forEach(s=>p[2][s]=2);[2,6,10,14].forEach(s=>p[2][s]=1);},
  ];
  fills[i]();
  return p;
}

const state={
  tab:'seq',bank:0,pattern:0,
  banks:Array.from({length:4},()=>Array.from({length:16},()=>mkPat())),
  history:[],copied:null,
  playing:false,recording:false,step:0,timer:null,
  velMode:false,writePending:false,
  knobs:{
    STEP: {v:16,min:1,max:16,def:16},
    TEMPO:{v:120,min:1,max:300,def:120},
    SWING:{v:0, min:0,max:100,def:0},
    VOLUME:{v:80,min:0,max:100,def:80},
  },
  activeKnob:null,
  mix:PARTS.map(()=>({vol:80,tune:64,decay:64,rev:0,muted:false,soloed:false})),
  reverb:{type:'Hall',size:50,decay:50,gate:0},
  fx1:{compOn:true,input:50,ratio:50,attack:30,release:50,output:70,eqOn:true,low:50,mid:50,high:50},
  fx2:{bypass:true,type:'Isolator',k1:0,k2:50,k3:100},
  fx2Open:false,
  midi:0,
  samples:PARTS.map((p)=>({name:p+' Default',buffer:null})),
};

// ================================================================
// AUDIO ENGINE
// ================================================================
let AC=null,masterOut=null,compNode=null,compInGain=null,compOutGain=null;
let eqLow=null,eqMid=null,eqHigh=null;
let reverbConv=null,reverbReturn=null,fx2In=null,fx2Out=null;
let ohGain=null;

function getAC(){
  if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)();_buildGraph();}
  if(AC.state==='suspended')AC.resume();
  return AC;
}
function _buildGraph(){
  masterOut=AC.createGain();masterOut.gain.value=state.knobs.VOLUME.v/100;
  compInGain=AC.createGain();compInGain.gain.value=1;
  compNode=AC.createDynamicsCompressor();
  compNode.threshold.value=-24;compNode.knee.value=2;
  compNode.ratio.value=4;compNode.attack.value=0.0007;compNode.release.value=0.05;
  compOutGain=AC.createGain();compOutGain.gain.value=1;
  eqLow=AC.createBiquadFilter();eqLow.type='lowshelf';eqLow.frequency.value=200;eqLow.gain.value=0;
  eqMid=AC.createBiquadFilter();eqMid.type='peaking';eqMid.frequency.value=1000;eqMid.Q.value=1;eqMid.gain.value=0;
  eqHigh=AC.createBiquadFilter();eqHigh.type='highshelf';eqHigh.frequency.value=4000;eqHigh.gain.value=0;
  reverbConv=AC.createConvolver();reverbConv.buffer=_makeIR();
  reverbReturn=AC.createGain();reverbReturn.gain.value=0.7;
  reverbConv.connect(reverbReturn);reverbReturn.connect(masterOut);
  fx2In=AC.createGain();fx2In.gain.value=1;
  fx2Out=AC.createGain();fx2Out.gain.value=1;
  fx2In.connect(fx2Out);
  fx2Out.connect(masterOut);
  masterOut.connect(compInGain);compInGain.connect(compNode);compNode.connect(compOutGain);
  compOutGain.connect(eqLow);eqLow.connect(eqMid);eqMid.connect(eqHigh);eqHigh.connect(AC.destination);
  _applyFX1();
}
function _makeIR(){
  const rv=state.reverb,sr=AC.sampleRate;
  let dur,dec;
  if(rv.type==='Hall'){dur=2+rv.size/100*3;dec=2.5+rv.decay/100*3;}
  else if(rv.type==='Room'){dur=0.3+rv.size/100*0.8;dec=0.6+rv.decay/100*1.2;}
  else{dur=0.7+rv.size/100*1.5;dec=1+rv.decay/100*2;}
  const len=Math.floor(sr*dur);
  const ir=AC.createBuffer(2,len,sr);
  const gateFrac=rv.gate/100;
  // ゲート位置：gate=0で全長、gate=100で超短い
  const gatePos=gateFrac>0.01?Math.floor(len*(1-gateFrac*0.95)):len;
  for(let c=0;c<2;c++){
    const d=ir.getChannelData(c);
    for(let i=0;i<len;i++){
      // プリディレイなし：最初から密なリフレクション
      const norm=i/len;
      let env=Math.exp(-norm*dec*1.5)*(0.5+0.5*Math.random());
      // ゲート：急峻なカット（指数4乗でほぼ垂直に落ちる）
      if(gateFrac>0.01&&i>gatePos){
        const n=(i-gatePos)/(len-gatePos);
        env*=Math.max(0,1-Math.pow(n,0.15));
      }
      d[i]=(Math.random()*2-1)*env;
    }
  }
  return ir;
}
function rebuildReverb(){if(reverbConv&&AC)reverbConv.buffer=_makeIR();}
function _applyFX1(){
  if(!compNode)return;
  const f=state.fx1;
  if(f.compOn){
    compInGain.gain.value=Math.pow(10,(f.input/100)*24/20);
    const ratios=[4,8,12,20,20];
    const ri=Math.min(4,Math.floor(f.ratio/100*5));
    compNode.ratio.value=ratios[ri];
    compNode.attack.value=0.00002+(f.attack/100)*0.00078;
    compNode.release.value=0.05+(f.release/100)*1.05;
    compNode.threshold.value=-18;compNode.knee.value=2;
    compOutGain.gain.value=Math.pow(10,(f.output/100)*24/20-12/20);
  }else{
    compInGain.gain.value=1;compNode.ratio.value=1;compNode.threshold.value=0;compOutGain.gain.value=1;
  }
  if(f.eqOn){
    eqLow.gain.value=(f.low/100)*24-12;
    eqMid.gain.value=(f.mid/100)*24-12;
    eqHigh.gain.value=(f.high/100)*24-12;
  }else{
    eqLow.gain.value=0;eqMid.gain.value=0;eqHigh.gain.value=0;
  }
}
function _applyFX2(){
  if(!fx2In||!fx2Out)return;
  try{fx2In.disconnect();}catch(e){}
  const f=state.fx2;
  if(f.bypass){fx2In.connect(fx2Out);return;}
  const t=f.type,k1=f.k1/100,k2=f.k2/100,k3=f.k3/100;
  let chain=[];
  if(t==='LPF'){const n=AC.createBiquadFilter();n.type='lowpass';n.frequency.value=80+k1*15000;n.Q.value=k2*15;chain=[n];}
  else if(t==='HPF'){const n=AC.createBiquadFilter();n.type='highpass';n.frequency.value=20+k1*8000;n.Q.value=k2*10;chain=[n];}
  else if(t==='Distortion'){const ws=AC.createWaveShaper();ws.curve=_distCurve(k1*400+1);ws.oversample='4x';const g=AC.createGain();g.gain.value=0.3+k2*0.7;chain=[ws,g];}
  else if(t==='Bit Crush'){const sp=AC.createScriptProcessor(256,1,1);const bits=Math.max(1,Math.round(1+k1*15));const step=Math.pow(2,bits);sp.onaudioprocess=e=>{const i=e.inputBuffer.getChannelData(0),o=e.outputBuffer.getChannelData(0);for(let n=0;n<i.length;n++)o[n]=Math.round(i[n]*step)/step;};chain=[sp];}
  else if(t==='Lo-fi'){const lpf=AC.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=200+k1*5000;const g=AC.createGain();g.gain.value=0.4+k2*0.8;chain=[lpf,g];}
  else if(t==='Isolator'){
    const lpf=AC.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=400;lpf.Q.value=0.7;
    const lg=AC.createGain();lg.gain.value=k1*2;
    const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1200;bp.Q.value=0.6;
    const mg=AC.createGain();mg.gain.value=k2*2;
    const hpf=AC.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=4000;hpf.Q.value=0.7;
    const hg=AC.createGain();hg.gain.value=k3*2;
    lpf.connect(lg);lg.connect(fx2Out);bp.connect(mg);mg.connect(fx2Out);hpf.connect(hg);hg.connect(fx2Out);
    fx2In.connect(lpf);fx2In.connect(bp);fx2In.connect(hpf);return;
  }
  if(chain.length){fx2In.connect(chain[0]);for(let i=0;i<chain.length-1;i++)chain[i].connect(chain[i+1]);chain[chain.length-1].connect(fx2Out);}
  else fx2In.connect(fx2Out);
}
function _distCurve(a){const n=256,c=new Float32Array(n);for(let i=0;i<n;i++){const x=i*2/n-1;c[i]=((Math.PI+a)*x)/(Math.PI+a*Math.abs(x));}return c;}
function _partOut(idx){
  const m=state.mix[idx],vol=(m.vol/100)*(state.knobs.VOLUME.v/100);
  const g=AC.createGain();g.gain.value=vol;g.connect(fx2In);
  if(m.rev>0&&reverbConv){const s=AC.createGain();s.gain.value=(m.rev/100)*vol*1.5;g.connect(s);s.connect(reverbConv);}
  return g;
}
function _silent(idx){
  if(state.mix[idx].muted)return true;
  const hs=state.mix.some(x=>x.soloed);
  return hs&&!state.mix[idx].soloed;
}
function _sr(st){return Math.pow(2,st/12);}
function triggerSound(part,vel=1.0){
  try{
    const ctx=getAC();
    const idx=PARTS.indexOf(part);
    if(_silent(idx))return;
    const m=state.mix[idx];
    const tune=m.tune-64;
    const decay=0.08+(m.decay/100)*2.4;
    const out=_partOut(idx);
    const t=ctx.currentTime;
    if(state.samples[idx].buffer){playSample(idx,out,t,vel,decay,tune);return;}
    if(part==='OH'){
      if(ohGain){try{ohGain.gain.cancelScheduledValues(t);ohGain.gain.setTargetAtTime(0.0001,t,0.004);}catch(e){}ohGain=null;}
      ohGain=synthOH(ctx,out,t,vel,decay,tune);
    }else if(part==='CH'){
      if(ohGain){try{ohGain.gain.cancelScheduledValues(t);ohGain.gain.setTargetAtTime(0.0001,t,0.003);}catch(e){}ohGain=null;}
      synthCH(ctx,out,t,vel,decay,tune);
    }else{
      switch(part){
        case'BD':synthBD(ctx,out,t,vel,decay,tune);break;
        case'SD':synthSD(ctx,out,t,vel,decay,tune);break;
        case'CY':synthCY(ctx,out,t,vel,decay,tune);break;
        case'CP':synthCP(ctx,out,t,vel,decay);break;
        case'T1':synthTom(ctx,out,t,vel,decay,tune,210,82);break;
        case'T2':synthTom(ctx,out,t,vel,decay,tune,148,58);break;
      }
    }
  }catch(e){console.warn(e);}
}
function playSample(idx,out,t,vel,decay,tune){
  const ctx=getAC();
  const src=ctx.createBufferSource();src.buffer=state.samples[idx].buffer;
  src.playbackRate.value=_sr(tune-0);
  const g=ctx.createGain();g.gain.setValueAtTime(vel,t);g.gain.exponentialRampToValueAtTime(0.001,t+Math.max(0.05,decay));
  src.connect(g);g.connect(out);src.start(t);src.stop(t+Math.max(0.05,decay)+0.05);
}
function synthBD(ctx,out,t,vel,decay,tune){
  const r=_sr(tune),dur=Math.max(0.07,decay*0.6);
  const g=ctx.createGain();g.gain.setValueAtTime(vel*1.6,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);g.connect(out);
  const o=ctx.createOscillator();o.type='sine';o.frequency.setValueAtTime(150*r,t);o.frequency.exponentialRampToValueAtTime(40*r,t+0.055);
  o.connect(g);o.start(t);o.stop(t+dur+.01);
  const cb=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.012),ctx.sampleRate);
  const cd=cb.getChannelData(0);for(let i=0;i<cd.length;i++)cd[i]=(Math.random()*2-1)*(1-i/cd.length);
  const cs=ctx.createBufferSource();cs.buffer=cb;
  const cg=ctx.createGain();cg.gain.setValueAtTime(vel*.9,t);cg.gain.exponentialRampToValueAtTime(.001,t+.012);
  cs.connect(cg);cg.connect(out);cs.start(t);cs.stop(t+.013);
}
function synthSD(ctx,out,t,vel,decay,tune){
  const r=_sr(tune),dur=Math.max(0.05,decay*0.45);
  const tg=ctx.createGain();tg.gain.setValueAtTime(vel*.65,t);tg.gain.exponentialRampToValueAtTime(.001,t+dur*.65);tg.connect(out);
  const o=ctx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(188*r,t);o.frequency.exponentialRampToValueAtTime(88*r,t+.05);
  o.connect(tg);o.start(t);o.stop(t+dur*.65+.01);
  const nl=Math.floor(ctx.sampleRate*Math.min(dur,.9));
  const nb=ctx.createBuffer(1,nl,ctx.sampleRate);const nd=nb.getChannelData(0);
  for(let i=0;i<nl;i++)nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nb;
  const hpf=ctx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=Math.min(18000,1500*r);
  const ng=ctx.createGain();ng.gain.setValueAtTime(vel*1.0,t);ng.gain.exponentialRampToValueAtTime(.001,t+dur);
  ns.connect(hpf);hpf.connect(ng);ng.connect(out);ns.start(t);ns.stop(t+dur+.01);
}
function synthCH(ctx,out,t,vel,decay,tune){
  const r=_sr(tune),dur=Math.max(.012,decay*.07);
  const nl=Math.floor(ctx.sampleRate*Math.min(dur+.008,.3));
  const nb=ctx.createBuffer(1,nl,ctx.sampleRate);const nd=nb.getChannelData(0);
  for(let i=0;i<nl;i++)nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nb;
  const hpf=ctx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=Math.min(18000,8000*r);
  const pk=ctx.createBiquadFilter();pk.type='peaking';pk.frequency.value=Math.min(18000,12000*r);pk.gain.value=6;pk.Q.value=1;
  const ng=ctx.createGain();ng.gain.setValueAtTime(vel*.7,t);ng.gain.exponentialRampToValueAtTime(.001,t+dur);
  ns.connect(hpf);hpf.connect(pk);pk.connect(ng);ng.connect(out);ns.start(t);ns.stop(t+dur+.01);
}
function synthOH(ctx,out,t,vel,decay,tune){
  const r=_sr(tune),dur=Math.max(.10,decay*.75);
  const nl=Math.floor(ctx.sampleRate*Math.min(dur+.04,1.8));
  const nb=ctx.createBuffer(1,nl,ctx.sampleRate);const nd=nb.getChannelData(0);
  for(let i=0;i<nl;i++)nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nb;
  const hpf=ctx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=Math.min(18000,5000*r);
  const pk=ctx.createBiquadFilter();pk.type='peaking';pk.frequency.value=Math.min(18000,8000*r);pk.gain.value=7;pk.Q.value=0.7;
  const ng=ctx.createGain();ng.gain.setValueAtTime(vel*.6,t);ng.gain.exponentialRampToValueAtTime(.001,t+dur);
  ns.connect(hpf);hpf.connect(pk);pk.connect(ng);ng.connect(out);ns.start(t);ns.stop(t+dur+.02);
  return ng;
}
function synthCY(ctx,out,t,vel,decay,tune){
  const r=_sr(tune);
  const dur=Math.max(.2,decay*0.85); // decay短縮
  // 808スタイル：6つの正弦波オシレーター（金属的な倍音構造）
  const freqs=[205,369,438,523,718,800];
  freqs.forEach((f,fi)=>{
    const o=ctx.createOscillator();o.type='square';o.frequency.value=f*r;
    const bpf=ctx.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=f*r*1.2;bpf.Q.value=0.4;
    const hpf=ctx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=5500;
    const g=ctx.createGain();
    // 高周波ほど速く減衰させる
    const fDur=dur*(1-fi*0.08);
    g.gain.setValueAtTime(vel*0.18,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+Math.max(0.03,fDur));
    o.connect(bpf);bpf.connect(hpf);hpf.connect(g);g.connect(out);
    o.start(t);o.stop(t+Math.max(0.03,fDur)+0.01);
  });
  // ノイズ層（薄め・高域のみ）
  const nl=Math.floor(ctx.sampleRate*Math.min(dur*.6,.8));
  const nb=ctx.createBuffer(1,nl,ctx.sampleRate);const nd=nb.getChannelData(0);
  for(let i=0;i<nl;i++)nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nb;
  const nhpf=ctx.createBiquadFilter();nhpf.type='highpass';nhpf.frequency.value=8000;
  const ng=ctx.createGain();ng.gain.setValueAtTime(vel*.15,t);ng.gain.exponentialRampToValueAtTime(.001,t+dur*.6);
  ns.connect(nhpf);nhpf.connect(ng);ng.connect(out);ns.start(t);ns.stop(t+dur*.6+.01);
}
function synthCP(ctx,out,t,vel,decay){
  const dur=Math.max(.035,decay*.22);
  [0,.007,.016,.027].forEach((dl,di)=>{
    const nl=Math.floor(ctx.sampleRate*Math.min(dur*(1-di*.15),.3));
    if(nl<10)return;
    const nb=ctx.createBuffer(1,nl,ctx.sampleRate);const nd=nb.getChannelData(0);
    for(let i=0;i<nl;i++)nd[i]=Math.random()*2-1;
    const ns=ctx.createBufferSource();ns.buffer=nb;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900+di*200;bp.Q.value=.9;
    const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=600;
    const g=ctx.createGain();const gv=vel*(1-di*.2);
    g.gain.setValueAtTime(gv*.95,t+dl);g.gain.exponentialRampToValueAtTime(.001,t+dl+dur*(1-di*.12));
    ns.connect(bp);bp.connect(hp);hp.connect(g);g.connect(out);ns.start(t+dl);ns.stop(t+dl+dur+.01);
  });
}
function synthTom(ctx,out,t,vel,decay,tune,ps,pe){
  const r=_sr(tune),dur=Math.max(.09,decay*.8);
  const g=ctx.createGain();g.gain.setValueAtTime(vel*1.2,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);g.connect(out);
  const o=ctx.createOscillator();o.type='sine';o.frequency.setValueAtTime(ps*r,t);o.frequency.exponentialRampToValueAtTime(pe*r,t+.09);
  o.connect(g);o.start(t);o.stop(t+dur+.01);
  const nl=Math.floor(ctx.sampleRate*.032);
  const nb=ctx.createBuffer(1,nl,ctx.sampleRate);const nd=nb.getChannelData(0);
  for(let i=0;i<nl;i++)nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nb;
  const ng=ctx.createGain();ng.gain.setValueAtTime(vel*.3,t);ng.gain.exponentialRampToValueAtTime(.001,t+.032);
  ns.connect(ng);ng.connect(out);ns.start(t);ns.stop(t+.04);
}
function playRecClick(s){
  if(s%2!==0)return;
  try{
    const ctx=getAC(),t=ctx.currentTime;
    const strong=(s%8===0);
    const freq=strong?1400:1000;
    const gain=strong?0.55:0.28;
    const o=ctx.createOscillator();o.type='sine';o.frequency.value=freq;
    const g=ctx.createGain();g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.035);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.04);
  }catch(e){}
}

// ================================================================
// CANVAS — 修正3: パート名とグリッドの境界を2px太線に
// ================================================================
const canvas=document.getElementById('seqCanvas');
const ctx2=canvas.getContext('2d');
function resizeCanvas(){
  const w=canvas.parentElement.clientWidth;
  canvas.width=w;
  const cH=Math.floor(w/18.5);
  canvas.height=cH*PARTS.length;
  canvas.style.height=canvas.height+'px';
  drawSeq();
}
function drawSeq(){
  const W=canvas.width,H=canvas.height,rows=PARTS.length;
  const lw=Math.floor(W*.07),cw=(W-lw)/MAX_STEPS,ch=H/rows;
  const steps=state.knobs.STEP.v;
  ctx2.fillStyle='#b8c8a0';ctx2.fillRect(0,0,W,H);
  for(let r=0;r<rows;r++){
    for(let s=0;s<MAX_STEPS;s++){
      const x=lw+s*cw,y=r*ch;
      const dis=s>=steps;
      const vel=state.banks[state.bank][state.pattern][r][s];
      ctx2.fillStyle=dis?'#c8d0b0':(Math.floor(s/4)%2?'#aabf8a':'#b4c49c');
      ctx2.fillRect(x+.5,y+.5,cw-.5,ch-.5);
      if(!dis&&vel>0){
        const cx=x+cw/2,cy=y+ch/2,rr=Math.min(cw,ch)*.28;
        ctx2.beginPath();ctx2.arc(cx,cy,rr,0,Math.PI*2);
        if(vel===1){ctx2.fillStyle='#eee';ctx2.fill();ctx2.strokeStyle='#999';ctx2.lineWidth=1.5;ctx2.stroke();}
        else if(vel===2){ctx2.fillStyle='#555';ctx2.fill();ctx2.strokeStyle='#222';ctx2.lineWidth=1.5;ctx2.stroke();}
        else{ctx2.fillStyle='#000';ctx2.fill();ctx2.strokeStyle='#000';ctx2.lineWidth=1.5;ctx2.stroke();}
      }
      if(state.playing&&s===state.step&&!dis){ctx2.fillStyle='rgba(255,150,0,.35)';ctx2.fillRect(x+.5,y+.5,cw-.5,ch-.5);}
    }
    // パート名エリア（左側）
    ctx2.fillStyle='#2a3a1a';ctx2.fillRect(0,r*ch,lw,ch);
    ctx2.fillStyle='#b8d890';ctx2.font='bold 11px monospace';ctx2.textAlign='center';ctx2.textBaseline='middle';
    ctx2.fillText(PARTS[r],lw/2,r*ch+ch/2);
  }
  // 横のグリッド線
  for(let r=0;r<=rows;r++){ctx2.strokeStyle='#8a9a70';ctx2.lineWidth=.5;ctx2.beginPath();ctx2.moveTo(0,r*ch);ctx2.lineTo(W,r*ch);ctx2.stroke();}
  // 縦のグリッド線
  for(let s=0;s<=MAX_STEPS;s++){
    const tk=s%4===0;ctx2.strokeStyle=tk?'#5a7a40':'#8a9a70';ctx2.lineWidth=tk?1.5:.5;
    ctx2.beginPath();ctx2.moveTo(lw+s*cw,0);ctx2.lineTo(lw+s*cw,H);ctx2.stroke();
  }
  // 修正3: パート名エリアとステップグリッドの境界を2px太線で描画
  ctx2.strokeStyle='#2a3a1a';ctx2.lineWidth=2;
  ctx2.beginPath();ctx2.moveTo(lw,0);ctx2.lineTo(lw,H);ctx2.stroke();
}

// Canvas input
let drawMode=null,isDraw=false;
function getCell(e){
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(canvas.width/rect.width);
  const y=(e.clientY-rect.top)*(canvas.height/rect.height);
  const lw=canvas.width*.07;
  const col=Math.floor((x-lw)/((canvas.width-lw)/MAX_STEPS));
  const row=Math.floor(y/(canvas.height/PARTS.length));
  if(col<0||col>=state.knobs.STEP.v||row<0||row>=PARTS.length)return null;
  return{col,row};
}
function onDown(e){
  const c=getCell(e);if(!c)return;
  isDraw=true;saveHist();
  const cur=state.banks[state.bank][state.pattern][c.row][c.col];
  if(state.velMode){state.banks[state.bank][state.pattern][c.row][c.col]=cycleVel(cur);drawMode=null;}
  else if(cur>0){state.banks[state.bank][state.pattern][c.row][c.col]=0;drawMode='rm';}
  else{state.banks[state.bank][state.pattern][c.row][c.col]=2;drawMode='add';}
  drawSeq();
}
function onMove(e){
  if(!isDraw||state.velMode)return;
  const c=getCell(e);if(!c)return;
  if(drawMode==='add')state.banks[state.bank][state.pattern][c.row][c.col]=2;
  else if(drawMode==='rm')state.banks[state.bank][state.pattern][c.row][c.col]=0;
  drawSeq();
}
canvas.addEventListener('mousedown',e=>onDown(e));
canvas.addEventListener('mousemove',e=>onMove(e));
canvas.addEventListener('mouseup',()=>{isDraw=false;drawMode=null;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e.touches[0]);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0]);},{passive:false});
canvas.addEventListener('touchend',()=>{isDraw=false;drawMode=null;},{passive:false});
function cycleVel(v){return v===0?2:v===2?3:v===3?1:2;}

// ================================================================
// PLAYBACK
// ================================================================
function bpmMs(){return 60000/state.knobs.TEMPO.v/4;}
function swingMs(s){return s%2===1?(bpmMs()*state.knobs.SWING.v/100*.5):0;}
function startPlay(){state.playing=true;state.step=0;sched();drawSeq();document.getElementById('ssBtn').textContent='STOP';}
function stopPlay(){state.playing=false;clearTimeout(state.timer);state.step=0;updPH();drawSeq();document.getElementById('ssBtn').textContent='START';}
function sched(){
  if(!state.playing)return;
  state.timer=setTimeout(()=>{
    trigStep(state.step);updPH();drawSeq();
    state.step=(state.step+1)%state.knobs.STEP.v;
    sched();
  },bpmMs()+swingMs(state.step));
}
function trigStep(s){
  if(state.recording)playRecClick(s);
  PARTS.forEach((p,i)=>{const v=state.banks[state.bank][state.pattern][i][s];if(v>0){flashPad(p);triggerSound(p,v===1?.15:v===2?.6:1.0);}});
}
function updPH(){for(let i=0;i<MAX_STEPS;i++){const d=document.getElementById('ph'+i);if(d)d.classList.toggle('on',state.playing&&i===state.step);}}
function flashPad(name){['padGrid','padGridMix'].forEach(id=>{const g=document.getElementById(id);if(!g)return;g.querySelectorAll('.pad').forEach(p=>{if(p.dataset.part===name){p.classList.add('active');setTimeout(()=>p.classList.remove('active'),80);}});});}

// ================================================================
// BUILD UI
// ================================================================
(()=>{const c=document.getElementById('phbar');for(let i=0;i<MAX_STEPS;i++){const d=document.createElement('div');d.className='ph-dot';d.id='ph'+i;c.appendChild(d);}})();

const KNAMES=['STEP','TEMPO','SWING','VOLUME'];
function buildKnobs(){
  const row=document.getElementById('knobsRow');row.innerHTML='';
  KNAMES.forEach(name=>{
    const k=state.knobs[name];
    const w=document.createElement('div');w.className='knob-wrap';
    w.innerHTML=`<div class="knob-name">${name}</div>
      <div class="knob-body" id="kb_${name}">
        <svg class="knob-ticks" id="kt_${name}" viewBox="0 0 52 52" width="52" height="52"></svg>
        <div class="knob-dial"><div class="knob-ind" id="ki_${name}"></div></div>
        <div class="knob-arrows" id="ka_${name}">
          <div class="k-arr" id="ku_${name}">▲</div>
          <div class="k-arr" id="kdn_${name}">▼</div>
        </div>
      </div>
      <div class="knob-val" id="kv_${name}">${fmtK(name,k.v)}</div>`;
    row.appendChild(w);
    updKRot(name);
    let lt=0;
    const kb=document.getElementById('kb_'+name);
    kb.addEventListener('click',()=>{
      const now=Date.now();
      if(now-lt<350){state.knobs[name].v=state.knobs[name].def;updK(name);state.activeKnob=null;updArrows();return;}
      lt=now;state.activeKnob=state.activeKnob===name?null:name;updArrows();
    });
    document.getElementById('ku_'+name).addEventListener('click',e=>{e.stopPropagation();chgK(name,1);});
    document.getElementById('kdn_'+name).addEventListener('click',e=>{e.stopPropagation();chgK(name,-1);});
    let sy=null,sv=null;
    kb.addEventListener('touchstart',e=>{e.preventDefault();sy=e.touches[0].clientY;sv=state.knobs[name].v;state.activeKnob=name;updArrows();},{passive:false});
    kb.addEventListener('touchmove',e=>{e.preventDefault();if(sy===null)return;const dy=Math.round((sy-e.touches[0].clientY)/1.5);const k2=state.knobs[name];k2.v=Math.max(k2.min,Math.min(k2.max,sv+dy));updK(name);},{passive:false});
    kb.addEventListener('touchend',e=>{e.preventDefault();sy=null;},{passive:false});
    kb.addEventListener('mousedown',e=>{sy=e.clientY;sv=state.knobs[name].v;state.activeKnob=name;updArrows();const mm=ev=>{const dy=Math.round((sy-ev.clientY)/1.5);const k2=state.knobs[name];k2.v=Math.max(k2.min,Math.min(k2.max,sv+dy));updK(name);};const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);sy=null;};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  });
}
function fmtK(n,v){return n==='TEMPO'?v+' BPM':String(v);}
function updArrows(){KNAMES.forEach(n=>{const e=document.getElementById('ka_'+n);if(e)e.classList.toggle('on',state.activeKnob===n);});}
function chgK(n,d){const k=state.knobs[n];k.v=Math.max(k.min,Math.min(k.max,k.v+d));updK(n);}
function updK(n){
  const k=state.knobs[n];
  document.getElementById('kv_'+n).textContent=fmtK(n,k.v);
  updKRot(n);
  if(n==='TEMPO'&&state.playing){clearTimeout(state.timer);sched();}
  if(n==='STEP')drawSeq();
  if(n==='VOLUME'&&masterOut)masterOut.gain.setTargetAtTime(k.v/100,getAC().currentTime,.02);
}
function updKRot(n){
  const k=state.knobs[n],norm=(k.v-k.min)/(k.max-k.min),angle=-135+norm*270;
  const ind=document.getElementById('ki_'+n);if(ind)ind.style.transform=`translateX(-50%) translateY(-100%) rotate(${angle}deg)`;
  drawTicks(n,norm);
}
function drawTicks(n,norm){
  const svg=document.getElementById('kt_'+n);if(!svg)return;
  let h='';const cx=26,cy=26,r=24,ticks=11;
  for(let i=0;i<ticks;i++){
    const a=(-135+i*270/(ticks-1)-90)*Math.PI/180;
    const x1=cx+(r-4)*Math.cos(a),y1=cy+(r-4)*Math.sin(a),x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a);
    const on=i/(ticks-1)<=norm;
    h+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${on?'#ff6600':'#555'}" stroke-width="1.5" stroke-linecap="round"/>`;
  }
  svg.innerHTML=h;
}

function buildPads(id){
  const g=document.getElementById(id);g.innerHTML='';
  [...PAD_TOP,...PAD_BOT].forEach(lbl=>{
    const p=document.createElement('div');p.className='pad';p.textContent=lbl;p.dataset.part=lbl;g.appendChild(p);
    const fire=()=>{
      p.classList.add('active');setTimeout(()=>p.classList.remove('active'),120);
      triggerSound(lbl,1.0);
      if(state.recording&&state.playing){const ri=PARTS.indexOf(lbl);if(ri>=0){saveHist();state.banks[state.bank][state.pattern][ri][state.step]=state.velMode?cycleVel(state.banks[state.bank][state.pattern][ri][state.step]):2;drawSeq();}}

const mixFxStore=Array.from({length:4},()=>Array.from({length:16},()=>null));

function isMixLocked(){
  const btn=document.getElementById('mixLockBtn');
  return btn&&btn.classList.contains('on');
}
function cloneMixFx(){
  return {
    mix:state.mix.map(m=>({...m})),
    reverb:{...state.reverb},
    fx2:{...state.fx2}
  };
}
function saveMixFxState(bank,pat){
  mixFxStore[bank][pat]=cloneMixFx();
}
function loadMixFxState(bank,pat){
  const s=mixFxStore[bank][pat];
  if(!s){mixFxStore[bank][pat]=cloneMixFx();return;}
  state.mix=s.mix.map(m=>({...m}));
  state.reverb={...s.reverb};
  state.fx2={...s.fx2};

function selPat(i){
  if(state.writePending){state.banks[state.bank][i]=clone(state.banks[state.bank][state.pattern]);state.pattern=i;cancelWrite();updPatBtns();return;}
  if(!isMixLocked()){
    saveMixFxState(state.bank,state.pattern);

    loadMixFxState(state.bank,i);
  } else {
    state.pattern=i;

  updPatBtns();drawSeq();
}

function buildMix(){
  const tb=document.getElementById('mixBody');tb.innerHTML='';
  PARTS.forEach((p,i)=>{
    const m=state.mix[i];
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><div class="mpart ${m.muted?'muted':''} ${m.soloed?'soloed':''}" data-idx="${i}">${p}</div></td>
      <td>${mkMK('vol',i,m.vol,100)}</td><td>${mkMK('tune',i,m.tune,127)}</td>
      <td>${mkMK('decay',i,m.decay,100)}</td><td>${mkMK('rev',i,m.rev,100)}</td>`;
    tb.appendChild(tr);
  });
  tb.querySelectorAll('.mpart').forEach(el=>{
    let lt=0,tapTimer=null;
    const handler=(e)=>{
      e.preventDefault();e.stopPropagation();
      const now=Date.now(),i=+el.dataset.idx;
      if(now-lt<380){
        clearTimeout(tapTimer);
        const alreadySolo=state.mix[i].soloed&&state.mix.filter(m=>m.soloed).length===1;
        state.mix.forEach(m=>m.soloed=false);
        if(!alreadySolo)state.mix[i].soloed=true;
        buildMix();lt=0;return;
      }
      lt=now;
      tapTimer=setTimeout(()=>{state.mix[i].muted=!state.mix[i].muted;buildMix();},240);
    };
    el.addEventListener('touchstart',handler,{passive:false});
    el.addEventListener('mousedown',handler);
  });
  tb.querySelectorAll('.mk').forEach(el=>{
    let sy=null,sv=null,lt=0;
    const getVal=()=>state.mix[+el.dataset.idx][el.dataset.p];
    const center=()=>el.dataset.p==='tune'?64:50;
    const setVal=(v)=>{const idx=+el.dataset.idx;const max=el.dataset.p==='tune'?127:100;state.mix[idx][el.dataset.p]=Math.max(0,Math.min(max,Math.round(v)));buildMix();};
    el.addEventListener('touchstart',e=>{e.preventDefault();sy=e.touches[0].clientY;sv=getVal();},{passive:false});
    el.addEventListener('touchmove',e=>{e.preventDefault();if(sy===null)return;setVal(sv+(sy-e.touches[0].clientY)/1.5);},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();sy=null;},{passive:false});
    el.addEventListener('mousedown',e=>{
      const now=Date.now();
      if(now-lt<350){setVal(center());lt=0;return;}
      lt=now;sy=e.clientY;sv=getVal();
      const mm=ev=>setVal(sv+(sy-ev.clientY)/1.5);
      const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);sy=null;};
      document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    });
  });
}
function mkMK(param,idx,val,max){
  const norm=val/max,angle=-135+norm*270;
  return `<div class="mk-wrap"><div class="mk" data-p="${param}" data-idx="${idx}"><div class="mk-ind" style="transform:translateX(-50%) translateY(-100%) rotate(${angle}deg)"></div></div><div class="mk-val">${val}</div></div>`;
}

document.getElementById('wavBtn').addEventListener('click',async()=>{
  try{
    const bpm=state.knobs.TEMPO.v;
    const steps=state.knobs.STEP.v;
    const msPerStep=60000/bpm/4;
    const totalSec=(msPerStep*steps/1000)*2; // 2ループ分
    const sr=44100;
    const oac=new OfflineAudioContext(2,Math.ceil(sr*totalSec),sr);
    const masterG=oac.createGain();masterG.gain.value=state.knobs.VOLUME.v/100;
    masterG.connect(oac.destination);

    // 各ステップのサウンドをスケジュール
    for(let loop=0;loop<2;loop++){
      for(let s=0;s<steps;s++){
        const t=(loop*steps+s)*msPerStep/1000;
        PARTS.forEach((part,pi)=>{
          const vel=state.banks[state.bank][state.pattern][pi][s];
          if(vel===0)return;
          const v=vel===1?.15:vel===2?.6:1.0;
          const m=state.mix[pi];
          if(m.muted)return;
          const vol=(m.vol/100)*v;
          const g=oac.createGain();g.gain.value=vol;g.connect(masterG);
          if(state.samples[pi].buffer){
            const src=oac.createBufferSource();src.buffer=state.samples[pi].buffer;
            const r=Math.pow(2,(m.tune-64)/12);src.playbackRate.value=r;
            const decay=0.08+(m.decay/100)*2.4;
            g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+Math.max(0.05,decay));
            src.connect(g);src.start(t);src.stop(t+Math.max(0.05,decay)+0.05);
          } else {
            // 合成音のスケジュール（簡易版）
            const tune=m.tune-64,decay=0.08+(m.decay/100)*2.4;
            const r2=Math.pow(2,tune/12);
            if(part==='BD'){
              const o=oac.createOscillator();o.type='sine';
              o.frequency.setValueAtTime(150*r2,t);o.frequency.exponentialRampToValueAtTime(40*r2,t+0.055);
              g.gain.setValueAtTime(vol*1.6,t);g.gain.exponentialRampToValueAtTime(0.001,t+Math.max(0.07,decay*0.6));
              o.connect(g);o.start(t);o.stop(t+Math.max(0.07,decay*0.6)+0.01);
            } else if(part==='SD'){
              const o=oac.createOscillator();o.type='triangle';
              o.frequency.setValueAtTime(188*r2,t);o.frequency.exponentialRampToValueAtTime(88*r2,t+0.05);
              g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+Math.max(0.05,decay*0.45));
              o.connect(g);o.start(t);o.stop(t+Math.max(0.05,decay*0.45)+0.01);
            } else if(part==='CY'||part==='OH'||part==='CH'){
              const buf=oac.createBuffer(1,Math.ceil(sr*Math.max(0.05,decay)),sr);
              const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
              const src2=oac.createBufferSource();src2.buffer=buf;
              const bpf=oac.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=part==='BD'?80:part==='SD'?200:8000;bpf.Q.value=0.5;
              src2.connect(bpf);bpf.connect(g);
              g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+Math.max(0.05,decay));
              src2.start(t);src2.stop(t+Math.max(0.05,decay)+0.01);
            } else {
              const o=oac.createOscillator();o.type='square';
              const freq=part==='CP'?900:part==='T1'?210:part==='T2'?148:400;
              o.frequency.setValueAtTime(freq*r2,t);
              g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+Math.max(0.05,decay*0.5));
              o.connect(g);o.start(t);o.stop(t+Math.max(0.05,decay*0.5)+0.01);
            }
          }
        });
      }
    }

    const rendered=await oac.startRendering();
    // WAVエンコード
    const wavBuf=_encodeWav(rendered);
    const blob=new Blob([wavBuf],{type:'audio/wav'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`DR1101_B${'ABCD'[state.bank]}_P${state.pattern+1}.wav`;
    a.click();
  }catch(e){alert('WAV export error: '+e.message);}
});

function _encodeWav(buffer){
  const numCh=buffer.numberOfChannels;
  const sr=buffer.sampleRate;
  const len=buffer.length;
  const ab=new ArrayBuffer(44+len*numCh*2);
  const v=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+len*numCh*2,true);ws(8,'WAVE');
  ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,numCh,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*numCh*2,true);v.setUint16(32,numCh*2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,len*numCh*2,true);
  let offset=44;
  const channels=Array.from({length:numCh},(_,c)=>buffer.getChannelData(c));
  for(let i=0;i<len;i++){
    for(let c=0;c<numCh;c++){
      const s=Math.max(-1,Math.min(1,channels[c][i]));
      v.setInt16(offset,s<0?s*0x8000:s*0x7FFF,true);offset+=2;
    }
  }
  return ab;
}

document.body.addEventListener('touchmove',e=>{

},{passive:false});

// ================================================================
// SONG MODE
// ================================================================
const songSlots=Array.from({length:16},()=>[]);
let curSongSlot=0;
const songState={get steps(){return songSlots[curSongSlot];},set steps(v){songSlots[curSongSlot]=v;},playing:false,cursor:0,timer:null};
function buildSongPage(){ buildSongTable(); }

function buildSongTable(){
  const tb=document.getElementById('songBody'); tb.innerHTML='';
  if(songState.steps.length===0){
    tb.innerHTML='<tr><td colspan="7" style="color:#888;padding:12px;font-size:10px">No steps. Tap ＋ADD to add patterns.</td></tr>';
    return;
  }
  songState.steps.forEach((st,i)=>{
    const tr=document.createElement('tr');
    tr.dataset.idx=i;
    if(songState.playing&&i===songState.cursor) tr.classList.add('playing-row');

    // BNK select
    const bnkOpts=['A','B','C','D'].map((b,bi)=>`<option value="${bi}"${bi===st.bank?'selected':''}>${b}</option>`).join('');
    // PTN select
    const patOpts=Array.from({length:16},(_,pi)=>`<option value="${pi}"${pi===st.pat?'selected':''}>${pi+1}</option>`).join('');
    // RPT select 1-99
    const rpt=st.rpt||1;
    const rptOpts=Array.from({length:99},(_,ri)=>`<option value="${ri+1}"${ri+1===rpt?'selected':''}>${ri+1}</option>`).join('');
    // BPM mode
    const bpmOpts=[['global','GLOBAL'],['pattern','PATTERN'],['input','INPUT']].map(([v,l])=>`<option value="${v}"${v===st.bpmMode?'selected':''}>${l}</option>`).join('');
    // BPM value display + arrows
    let bpmValTxt='';
    if(st.bpmMode==='global') bpmValTxt=`<span style="font-size:9px">${state.knobs.TEMPO.v}</span>`;
    else if(st.bpmMode==='pattern') bpmValTxt=`<span style="font-size:9px">PTN</span>`;
    else bpmValTxt=`<span class="sbv" style="font-size:9px">${st.bpmVal}</span><span class="bpm-arr"><button class="bup">▲</button><button class="bdn">▼</button></span>`;

    tr.innerHTML=`
      <td class="song-row-num">${i+1}</td>
      <td><select class="song-isel sbnk" data-idx="${i}">${bnkOpts}</select></td>
      <td><select class="song-isel spat" data-idx="${i}">${patOpts}</select></td>
      <td><select class="song-isel srpt" data-idx="${i}">${rptOpts}</select></td>
      <td><input class="song-comment scmt" type="text" maxlength="40" placeholder="comment..." value="${st.comment||''}" data-idx="${i}"></td>
      <td><select class="song-isel sbpm" data-idx="${i}">${bpmOpts}</select></td>
      <td>${bpmValTxt}</td>
      <td><button class="song-del-btn" data-idx="${i}" style="background:linear-gradient(180deg,#f88,#e44);border:1px solid #a00;border-radius:3px;color:#fff;font-size:10px;font-weight:bold;padding:2px 5px;cursor:pointer">✕</button></td>`;
    tb.appendChild(tr);

    const numTd=tr.querySelector('.song-row-num');
    if(st.loopBack) tr.classList.add('loop-mark');
    numTd.addEventListener('dblclick',()=>{
      songState.steps[i].loopBack=!songState.steps[i].loopBack;
      buildSongTable();
    });
    tr.querySelector('.sbnk').addEventListener('change',e=>{songState.steps[i].bank=+e.target.value;buildSongTable();});
    tr.querySelector('.spat').addEventListener('change',e=>{songState.steps[i].pat=+e.target.value;buildSongTable();});
    tr.querySelector('.srpt').addEventListener('change',e=>{songState.steps[i].rpt=+e.target.value;});
    tr.querySelector('.scmt').addEventListener('input',e=>{songState.steps[i].comment=e.target.value;});
    tr.querySelector('.sbpm').addEventListener('change',e=>{songState.steps[i].bpmMode=e.target.value;if(e.target.value==='input'&&!songState.steps[i].bpmVal)songState.steps[i].bpmVal=120;buildSongTable();});
    // BPM arrows
    const bup=tr.querySelector('.bup'),bdn=tr.querySelector('.bdn');
    if(bup) bup.addEventListener('click',()=>{songState.steps[i].bpmVal=Math.min(300,(songState.steps[i].bpmVal||120)+1);buildSongTable();});
    if(bdn) bdn.addEventListener('click',()=>{songState.steps[i].bpmVal=Math.max(1,(songState.steps[i].bpmVal||120)-1);buildSongTable();});
    // delete
    tr.querySelector('.song-del-btn').addEventListener('click',()=>{songState.steps.splice(i,1);buildSongTable();});
  });

  // Long press drag-to-reorder
  let dragIdx=null,longTimer=null;
  tb.querySelectorAll('tr').forEach(row=>{
    const idx=+row.dataset.idx;
    const startDrag=(e)=>{
      longTimer=setTimeout(()=>{
        dragIdx=idx;
        row.classList.add('dragging');
      },500);
    };
    const cancelDrag=()=>{clearTimeout(longTimer);};
    const moveDrag=(e)=>{
      if(dragIdx===null)return;
      e.preventDefault();
      const y=e.touches?e.touches[0].clientY:e.clientY;
      tb.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over'));
      const target=[...tb.querySelectorAll('tr')].find(r=>{
        const rect=r.getBoundingClientRect();
        return y>=rect.top&&y<=rect.bottom;
      });
      if(target&&+target.dataset.idx!==dragIdx) target.classList.add('drag-over');
    };
    const endDrag=(e)=>{
      clearTimeout(longTimer);
      if(dragIdx===null)return;
      const y=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
      const target=[...tb.querySelectorAll('tr')].find(r=>{
        const rect=r.getBoundingClientRect();
        return y>=rect.top&&y<=rect.bottom;
      });
      if(target){
        const toIdx=+target.dataset.idx;
        if(toIdx!==dragIdx){
          const [moved]=songState.steps.splice(dragIdx,1);
          songState.steps.splice(toIdx,0,moved);
        }
      }
      dragIdx=null;
      buildSongTable();
    };
    row.addEventListener('touchstart',startDrag,{passive:true});
    row.addEventListener('touchmove',moveDrag,{passive:false});
    row.addEventListener('touchend',endDrag,{passive:true});
    row.addEventListener('mousedown',startDrag);
    row.addEventListener('mousemove',moveDrag);
    row.addEventListener('mouseup',endDrag);
    row.addEventListener('mouseleave',cancelDrag);
  });
}

document.getElementById('songNoSel').addEventListener('change',e=>{
  if(songState.playing) stopSong();
  curSongSlot=+e.target.value;
  buildSongTable();
});

// ADD button — 直接追加
document.getElementById('songAddBtn').addEventListener('click',()=>{
  songState.steps.push({bank:0,pat:0,rpt:1,comment:'',bpmMode:'global',bpmVal:120,loopBack:false});
  buildSongTable();
});

document.getElementById('songClearBtn').addEventListener('click',()=>{songState.steps=[];buildSongTable();});
document.getElementById('songPlayBtn').addEventListener('click',toggleSongPlay);
document.getElementById('songStopBtn').addEventListener('click',stopSong);

function toggleSongPlay(){if(songState.playing){stopSong();}else{startSong();}}
function startSong(){
  if(songState.steps.length===0)return;
  stopPlay();
  songState.playing=true;songState.cursor=0;
  document.getElementById('songPlayBtn').classList.add('active');
  document.getElementById('songPlayBtn').textContent='■ STOP';
  runSongStep();
}
function stopSong(){
  songState.playing=false;clearTimeout(songState.timer);
  document.getElementById('songPlayBtn').classList.remove('active');
  document.getElementById('songPlayBtn').textContent='▶ PLAY';
  document.getElementById('songNoSel').textContent;
  buildSongTable();
}
function runSongStep(){
  if(!songState.playing||songState.steps.length===0)return;
  const st=songState.steps[songState.cursor];
  state.bank=st.bank;state.pattern=st.pat;
  const bpm=st.bpmMode==='global'?state.knobs.TEMPO.v:st.bpmMode==='input'?st.bpmVal:state.knobs.TEMPO.v;
  const steps=state.knobs.STEP.v;
  const rpt=st.rpt||1;
  document.getElementById('songNoSel').value;
  buildSongTable();updPatBtns();drawSeq();
  state.playing=true;state.step=0;
  if(state.timer)clearTimeout(state.timer);
  document.getElementById('ssBtn').textContent='STOP';
  let repsDone=0;
  const runRep=()=>{
    if(!songState.playing)return;
    schedSong(bpm,steps,0,()=>{
      repsDone++;
      if(repsDone<rpt){runRep();}
      else{
        if(st.loopBack){ songState.cursor=0; runSongStep(); }
        else if(songState.cursor+1>=songState.steps.length){ stopSong(); }
        else{ songState.cursor++; runSongStep(); }
      }
    });
  };
  runRep();
}
function schedSong(bpm,totalSteps,curStep,onDone){
  if(!songState.playing)return;
  const msPerStep=60000/bpm/4;
  const swing=curStep%2===1?(msPerStep*state.knobs.SWING.v/100*.5):0;
  state.timer=setTimeout(()=>{
    trigStep(curStep);updPH();drawSeq();
    const next=curStep+1;
    if(next>=totalSteps){state.step=0;onDone();}
    else{state.step=next;schedSong(bpm,totalSteps,next,onDone);}
  },msPerStep+swing);
}

// MIXFX LOCK / CLOCK OUT toggle
['mixLockBtn','clockOutBtn'].forEach(id=>{
  const btn=document.getElementById(id);
  if(!btn)return;
  btn.addEventListener('click',()=>{
    const on=btn.textContent==='OFF';
    btn.textContent=on?'ON':'OFF';
    btn.classList.toggle('on',on);
  });
});

buildPads('padGrid');
